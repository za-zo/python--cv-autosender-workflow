name: CV Autosender Workflow

on:
  workflow_dispatch:
  # schedule:
  #   # Runs every 5 minutes
  #   - cron: "*/5 * * * *"

jobs:
  run-sender:
    name: Run CV Autosender (Instance ${{ matrix.account_index }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account_index: [1, 2, 3, 4, 5, 6, 7]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Optional: NOTIFICATION_SMTP_EMAIL + NOTIFICATION_SMTP_PASSWORD send failure alerts
      # when the workflow fails before a pool email is claimed (same Gmail-style app password pattern).
      - name: Run CV Autosender
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          NOTIFICATION_SMTP_EMAIL: ${{ secrets.NOTIFICATION_SMTP_EMAIL }}
          NOTIFICATION_SMTP_PASSWORD: ${{ secrets.NOTIFICATION_SMTP_PASSWORD }}
          MASK_LOGS: true
          PYTHONUNBUFFERED: "1"
          ACCOUNT_INDEX: ${{ matrix.account_index }}
        run: python main.py

  re-trigger:
    name: Check and Re-run
    needs: run-sender
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check for more jobs
        id: check
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
        run: |
          if python check_jobs.py; then
            echo "has_more=true" >> $GITHUB_OUTPUT
          else
            echo "has_more=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger next run
        if: steps.check.outputs.has_more == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting 30 seconds before re-triggering..."
          sleep 30
          gh workflow run cv-autosender.yml -R ${{ github.repository }}

